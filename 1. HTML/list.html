<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boiler plate code</title>
 </head>
<body>
    <h4>Unordered Lists</h4>
    <ul>
        <li>BMW</li>
        <li>Porche</li>
        <li>Koinsegg</li>
        <li>Lamborghini</li>
    </ul>
    <h4>Ordered Lists</h4>
    <ol type="A">
        <li>BMW</li>
        <li>Koinsegg</li>
        <li>Porche</li>
        <li>Lamborghini</li>
    </ol>

</body>
</html>
